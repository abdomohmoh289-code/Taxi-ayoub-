<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚖 TAXI AYOUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #FFD700;
            display: flex;
            justify-content: center;
            padding: 15px;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at top, #FFE44D, #FFD700 60%, #F5C800);
        }

        .app-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.3);
            position: relative;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER مع شعار ===== */
        header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 25px 25px 18px;
            text-align: center;
            border-bottom: 3px solid #FFD700;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.05) 0%, transparent 60%);
            animation: rotateGlow 20s infinite linear;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700, #FFED4A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #1a1a2e;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
            border: 3px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
            animation: pulseLogo 2s ease-in-out infinite;
        }

        @keyframes pulseLogo {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 60px rgba(255, 215, 0, 0.5), 0 0 80px rgba(255, 215, 0, 0.2); }
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-text h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFED4A, #FFD700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: goldShine 3s ease-in-out infinite;
            letter-spacing: 3px;
            font-family: 'Tajawal', sans-serif;
            line-height: 1;
        }

        @keyframes goldShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo-text .sub-title {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 6px;
            margin-top: 2px;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.5);
        }

        .logo-text .sub-title i {
            margin: 0 5px;
            color: #FFD700;
            -webkit-text-fill-color: #FFD700;
        }

        .page-title {
            padding: 18px 25px 5px;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .page-title i {
            color: #1a1a2e;
        }

        /* ===== MAIN MENU - فقط أزرار السيارات ===== */
        .main-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 18px 25px 10px;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .menu-btn {
            padding: 28px 15px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-height: 130px;
            position: relative;
            border: 2px solid rgba(0, 0, 0, 0.08);
        }

        .menu-btn:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        .menu-btn .icon {
            font-size: 40px;
            transition: all 0.3s ease;
        }

        .menu-btn:hover .icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .menu-btn .label {
            font-size: 17px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .menu-btn .sub-label {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.5);
            font-weight: 300;
        }

        .menu-btn .driver-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.06);
            color: #1a1a2e;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .btn-taxi1 {
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            border: 2px solid #1a3a6b;
        }
        .btn-taxi1:hover {
            border-color: #FFD700;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
        }

        .btn-taxi2 {
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            border: 2px solid #1a3a6b;
        }
        .btn-taxi2:hover {
            border-color: #FFD700;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
        }

        .btn-grand {
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            border: 2px solid #1a3a6b;
        }
        .btn-grand:hover {
            border-color: #FFD700;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
        }

        /* ===== كوتشي بحصان ===== */
        .btn-koutchi {
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            border: 2px solid #1a3a6b;
            position: relative;
        }
        .btn-koutchi:hover {
            border-color: #FFD700;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
        }

        .btn-koutchi::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(255, 215, 0, 0.05) 15px, rgba(255, 215, 0, 0.05) 30px);
            border-radius: 15px;
        }
        .btn-koutchi .label,
        .btn-koutchi .sub-label,
        .btn-koutchi .icon {
            position: relative;
            z-index: 1;
        }

        .reset-section {
            padding: 5px 25px 25px;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .btn-reset {
            padding: 14px 40px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 25px rgba(220, 53, 69, 0.3);
            width: 100%;
            justify-content: center;
        }

        .btn-reset:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 35px rgba(220, 53, 69, 0.4);
        }

        .btn-reset:active {
            transform: scale(0.95);
        }

        /* ==========================================
        CAR SELECTION VIEW - تظهر فقط عند الضغط على سيارة
        ========================================== */
        #car-selection-view {
            display: none;
            padding: 0 25px 25px;
            position: relative;
            flex: 1;
            flex-direction: column;
        }

        #car-selection-view.active {
            display: flex;
            animation: fadeSlide 0.5s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .car-selection-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0 18px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
            flex-shrink: 0;
        }

        .car-selection-header h2 {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .car-selection-header h2 i {
            font-size: 28px;
            color: #1a3a6b;
        }

        .drivers-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            flex: 1;
        }

        .driver-select-btn {
            padding: 40px 20px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 150px;
            border: 3px solid rgba(0, 0, 0, 0.06);
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
        }

        .driver-select-btn:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
        }

        .driver-select-btn:active {
            transform: scale(0.95);
        }

        .driver-select-btn .d-icon {
            font-size: 48px;
        }

        .driver-select-btn .d-label {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .driver-select-btn .d-sub {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.4);
        }

        .driver-select-btn .d-total {
            background: linear-gradient(135deg, #1a3a6b, #0D2447);
            color: #FFD700;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            margin-top: 5px;
            box-shadow: 0 2px 15px rgba(26, 58, 107, 0.2);
        }

        .driver-select-btn .d-total i {
            margin-left: 5px;
        }

        .btn-driver1 {
            border-color: #2E7EB0;
        }
        .btn-driver1:hover {
            border-color: #1a3a6b;
            box-shadow: 0 10px 40px rgba(46, 126, 176, 0.2);
        }

        .btn-driver2 {
            border-color: #00A86B;
        }
        .btn-driver2:hover {
            border-color: #008a56;
            box-shadow: 0 10px 40px rgba(0, 168, 107, 0.2);
        }

        /* ==========================================
        DRIVER DETAIL VIEW
        ========================================== */
        #driver-detail-view {
            display: none;
            padding: 0 25px 25px;
            position: relative;
            flex: 1;
            flex-direction: column;
        }

        #driver-detail-view.active {
            display: flex;
            animation: fadeSlide 0.5s ease;
        }

        .driver-detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0 18px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.06);
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
            flex-shrink: 0;
        }

        .driver-detail-header h2 {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .driver-detail-header h2 i {
            font-size: 28px;
        }

        .driver-card-single {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            flex: 1;
        }

        .driver-card-single .driver-header-single {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .driver-card-single .driver-name-single {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .driver-card-single .driver-total-single {
            background: linear-gradient(135deg, #1a3a6b, #0D2447);
            color: #FFD700;
            padding: 6px 24px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 2px 15px rgba(26, 58, 107, 0.2);
        }

        .driver-card-single .driver-total-single i {
            margin-left: 5px;
        }

        .shift-row-single {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .shift-row-single label {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
        }

        .shift-row-single input {
            width: 130px;
            padding: 8px 12px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            background: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            color: #1a1a2e;
            transition: all 0.3s ease;
        }

        .shift-row-single input:focus {
            border-color: #1a3a6b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 58, 107, 0.1);
        }

        .shift-row-single input::placeholder {
            color: #aaa;
            font-weight: 400;
        }

        .btn-save-single {
            padding: 8px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1a3a6b, #0D2447);
            color: #FFD700;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-save-single:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 25px rgba(26, 58, 107, 0.3);
        }

        /* ===== SHIFTS LIST ===== */
        .shifts-list-single {
            margin-top: 8px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding-top: 8px;
        }

        .shifts-list-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shifts-list-title i {
            color: #1a3a6b;
        }

        .shift-item-single {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            margin-bottom: 4px;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .shift-item-single .shift-info-single {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .shift-item-single .shift-amount-single {
            font-weight: 700;
            color: #1a3a6b;
            font-size: 15px;
        }

        .shift-item-single .shift-time-single {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.4);
        }

        .shift-item-single .shift-actions-single {
            display: flex;
            gap: 6px;
        }

        .shift-item-single .shift-actions-single button {
            padding: 2px 10px;
            border: none;
            border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit-shift-single {
            background: rgba(46, 126, 176, 0.1);
            color: #2E7EB0;
        }

        .btn-edit-shift-single:hover {
            background: rgba(46, 126, 176, 0.2);
        }

        .btn-delete-shift-single {
            background: rgba(230, 126, 34, 0.1);
            color: #E67E22;
        }

        .btn-delete-shift-single:hover {
            background: rgba(230, 126, 34, 0.2);
        }

        .no-shifts-single {
            color: rgba(0, 0, 0, 0.3);
            font-size: 13px;
            text-align: center;
            padding: 8px;
        }

        /* ===== زر الرجوع - مكبر وفي أسفل يمين الشاشة ===== */
        .back-button-container {
            display: flex;
            justify-content: flex-end;
            padding: 20px 0 10px;
            margin-top: auto;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            margin-bottom: 5px;
        }

        .btn-back-bottom {
            padding: 20px 50px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #FF6B00, #E85D00);
            color: #FFFFFF;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 35px rgba(255, 107, 0, 0.4);
            border: 2px solid rgba(255, 215, 0, 0.3);
            width: 100%;
            justify-content: center;
        }

        .btn-back-bottom:hover {
            transform: scale(1.03) translateX(-5px);
            box-shadow: 0 10px 45px rgba(255, 107, 0, 0.5);
            border-color: #FFD700;
        }

        .btn-back-bottom:active {
            transform: scale(0.95);
        }

        .btn-back-bottom i {
            font-size: 30px;
        }

        .btn-back-bottom .back-text {
            font-size: 22px;
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-box {
            background: white;
            border-radius: 25px;
            max-width: 420px;
            width: 100%;
            padding: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            position: relative;
            border: 3px solid #FFD700;
        }

        .modal-box .close-modal {
            position: absolute;
            top: 15px;
            left: 20px;
            background: none;
            border: none;
            color: #999;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-box .close-modal:hover {
            color: #1a1a2e;
            transform: rotate(90deg);
        }

        .modal-box h2 {
            color: #1a1a2e;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
        }

        .modal-box .modal-sub {
            text-align: center;
            color: rgba(0, 0, 0, 0.5);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .modal-edit-row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-edit-row input {
            width: 140px;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Tajawal', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            color: #1a1a2e;
        }

        .modal-edit-row input:focus {
            border-color: #1a3a6b;
            outline: none;
        }

        .modal-edit-row button {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1a3a6b, #0D2447);
            color: #FFD700;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-edit-row button:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(26, 58, 107, 0.3);
        }

        /* ===== RESET MODAL ===== */
        .reset-code-input {
            text-align: center;
            margin: 15px 0;
        }

        .reset-code-input input {
            width: 200px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 3px;
            color: #1a1a2e;
            background: #f8f9fa;
        }

        .reset-code-input input:focus {
            border-color: #dc3545;
            outline: none;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
        }

        .reset-code-input input::placeholder {
            color: transparent;
        }

        .btn-reset-confirm {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 auto;
        }

        .btn-reset-confirm:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 25px rgba(220, 53, 69, 0.3);
        }

        .btn-reset-cancel {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            background: #e9ecef;
            color: #495057;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-reset-cancel:hover {
            background: #dee2e6;
        }

        .reset-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .alert {
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: fadeSlide 0.4s ease;
            border: 1px solid transparent;
        }

        .alert-success {
            background: rgba(0, 168, 107, 0.1);
            color: #00A86B;
            border-color: rgba(0, 168, 107, 0.1);
        }
        .alert-danger {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border-color: rgba(220, 53, 69, 0.1);
        }
        .alert-warning {
            background: rgba(255, 215, 0, 0.1);
            color: #B8860B;
            border-color: rgba(255, 215, 0, 0.1);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .logo-icon { width: 60px; height: 60px; font-size: 30px; }
            .logo-text h1 { font-size: 34px; }

            .main-menu {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                padding: 12px 15px 10px;
            }

            .menu-btn {
                padding: 20px 10px;
                min-height: 100px;
            }
            .menu-btn .icon { font-size: 30px; }
            .menu-btn .label { font-size: 14px; }

            #car-selection-view { padding: 0 15px 15px; }
            .car-selection-header h2 { font-size: 18px; }

            .drivers-selection {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .driver-select-btn {
                padding: 25px 15px;
                min-height: 110px;
            }
            .driver-select-btn .d-icon { font-size: 36px; }
            .driver-select-btn .d-label { font-size: 17px; }
            .driver-select-btn .d-total { font-size: 15px; padding: 4px 14px; }

            #driver-detail-view { padding: 0 15px 15px; }
            .driver-detail-header h2 { font-size: 18px; }

            .driver-card-single .driver-name-single { font-size: 18px; }
            .driver-card-single .driver-total-single { font-size: 16px; padding: 4px 16px; }

            .shift-row-single {
                flex-direction: column;
                align-items: stretch;
            }
            .shift-row-single input { width: 100%; }

            .shift-item-single { flex-wrap: wrap; gap: 5px; }

            .modal-box { padding: 20px; }

            .reset-section { padding: 5px 15px 15px; }
            .btn-reset { font-size: 15px; padding: 12px 20px; }

            .btn-back-bottom {
                padding: 16px 30px;
                font-size: 20px;
            }
            .btn-back-bottom i { font-size: 24px; }
            .btn-back-bottom .back-text { font-size: 18px; }
        }

        @media (max-width: 480px) {
            .logo-icon { width: 50px; height: 50px; font-size: 24px; }
            .logo-text h1 { font-size: 26px; }
            .logo-text .sub-title { font-size: 12px; letter-spacing: 3px; }

            .main-menu {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                padding: 8px 10px 8px;
            }

            .menu-btn {
                padding: 14px 6px;
                min-height: 80px;
                border-radius: 14px;
            }
            .menu-btn .icon { font-size: 22px; }
            .menu-btn .label { font-size: 11px; }
            .menu-btn .sub-label { font-size: 8px; }
            .menu-btn .driver-badge { font-size: 8px; padding: 2px 8px; top: 6px; left: 6px; }

            .car-selection-header h2 { font-size: 15px; }

            .drivers-selection {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .driver-select-btn {
                padding: 18px 10px;
                min-height: 80px;
                border-radius: 14px;
            }
            .driver-select-btn .d-icon { font-size: 28px; }
            .driver-select-btn .d-label { font-size: 14px; }
            .driver-select-btn .d-sub { font-size: 10px; }
            .driver-select-btn .d-total { font-size: 13px; padding: 3px 10px; }

            .driver-detail-header h2 { font-size: 15px; }

            .driver-card-single { padding: 12px; }
            .driver-card-single .driver-name-single { font-size: 15px; }
            .driver-card-single .driver-total-single { font-size: 14px; padding: 3px 12px; }

            .btn-save-single { font-size: 12px; padding: 6px 14px; }
            .shift-row-single input { font-size: 13px; padding: 6px 10px; }

            .shift-item-single .shift-info-single { flex-wrap: wrap; gap: 8px; }

            .modal-box { padding: 15px; }
            .modal-box h2 { font-size: 18px; }
            .modal-edit-row input { width: 100px; font-size: 15px; }

            .reset-section { padding: 5px 10px 12px; }
            .btn-reset { font-size: 13px; padding: 10px 15px; }

            .reset-code-input input { width: 150px; font-size: 18px; padding: 10px; }
            .reset-actions { flex-direction: column; align-items: center; }
            .btn-reset-confirm, .btn-reset-cancel { width: 100%; justify-content: center; }

            .btn-back-bottom {
                padding: 12px 20px;
                font-size: 16px;
                border-radius: 14px;
                gap: 10px;
            }
            .btn-back-bottom i { font-size: 18px; }
            .btn-back-bottom .back-text { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ===== HEADER ===== -->
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-taxi"></i>
                </div>
                <div class="logo-text">
                    <h1>TAXI AYOUB</h1>
                    <div class="sub-title"><i class="fas fa-star"></i> MARRAKECH <i class="fas fa-star"></i></div>
                </div>
            </div>
        </header>

        <div id="alert-container" style="padding:0 25px;padding-top:12px;"></div>

        <!-- ==========================================
        MAIN MENU - فقط أزرار السيارات وبدء من جديد
        ========================================== -->
        <div id="main-menu" style="display:flex;flex-direction:column;flex:1;">
            <div class="page-title">
                <i class="fas fa-car"></i> اختر نوع السيارة
            </div>

            <div class="main-menu">
                <button class="menu-btn btn-taxi1" onclick="playClickSound(); openCarSelection('taxi1')">
                    <span class="driver-badge">2 سائق</span>
                    <span class="icon">🚕</span>
                    <span class="label">سيارة صغيرة 1</span>
                    <span class="sub-label">Petit Taxi 1</span>
                </button>

                <button class="menu-btn btn-taxi2" onclick="playClickSound(); openCarSelection('taxi2')">
                    <span class="driver-badge">2 سائق</span>
                    <span class="icon">🚖</span>
                    <span class="label">سيارة صغيرة 2</span>
                    <span class="sub-label">Petit Taxi 2</span>
                </button>

                <button class="menu-btn btn-grand" onclick="playClickSound(); openCarSelection('grand')">
                    <span class="driver-badge">2 سائق</span>
                    <span class="icon">🚗</span>
                    <span class="label">سيارة كبيرة</span>
                    <span class="sub-label">Grand Taxi</span>
                </button>

                <button class="menu-btn btn-koutchi" onclick="playClickSound(); openCarSelection('koutchi')">
                    <span class="driver-badge">1 سائق</span>
                    <span class="icon">🐴</span>
                    <span class="label">كوتشي</span>
                    <span class="sub-label">Koutchi</span>
                </button>
            </div>

            <div class="reset-section">
                <button class="btn-reset" onclick="playClickSound(); openResetModal()">
                    <i class="fas fa-trash-alt"></i>
                    بدء من جديد
                    <i class="fas fa-undo"></i>
                </button>
            </div>
        </div>

        <!-- ==========================================
        CAR SELECTION VIEW - تظهر فقط عند الضغط على سيارة
        ========================================== -->
        <div id="car-selection-view">
            <div class="car-selection-header">
                <h2 id="carSelectionTitle"><i class="fas fa-car"></i> سيارة صغيرة 1</h2>
            </div>
            <div class="drivers-selection" id="drivers-selection-container"></div>

            <div class="back-button-container">
                <button class="btn-back-bottom" onclick="playClickSound(); closeCarSelection()">
                    <i class="fas fa-arrow-right"></i>
                    <span class="back-text">رجوع</span>
                </button>
            </div>
        </div>

        <!-- ==========================================
        DRIVER DETAIL VIEW
        ========================================== -->
        <div id="driver-detail-view">
            <div class="driver-detail-header">
                <h2 id="driverDetailTitle"><i class="fas fa-user"></i> سائق رقم 1</h2>
            </div>
            <div class="driver-card-single" id="driver-detail-container"></div>

            <div class="back-button-container">
                <button class="btn-back-bottom" onclick="playClickSound(); closeDriverDetail()">
                    <i class="fas fa-arrow-right"></i>
                    <span class="back-text">رجوع</span>
                </button>
            </div>
        </div>

        <!-- ===== EDIT MODAL ===== -->
        <div class="modal-overlay" id="editModal">
            <div class="modal-box">
                <button class="close-modal" onclick="playClickSound(); closeEditModal()">
                    <i class="fas fa-times"></i>
                </button>
                <h2>✏️ تعديل الدفعة</h2>
                <p class="modal-sub" id="editModalSub">سائق رقم 1</p>
                <div style="text-align:center;">
                    <div class="modal-edit-row">
                        <input type="number" id="editAmountInput" placeholder="المبلغ" min="1">
                        <button onclick="playClickSound(); saveEditShift()">
                            <i class="fas fa-save"></i> حفظ
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== RESET MODAL ===== -->
        <div class="modal-overlay" id="resetModal">
            <div class="modal-box">
                <button class="close-modal" onclick="playClickSound(); closeResetModal()">
                    <i class="fas fa-times"></i>
                </button>
                <h2>⚠️ بدء من جديد</h2>
                <p class="modal-sub">سيتم حذف جميع الدفعات فقط</p>

                <div class="reset-code-input">
                    <p style="color:#6c757d;font-size:13px;margin-bottom:8px;">أدخل كود التأكيد:</p>
                    <input type="password" id="resetCodeInput" maxlength="6" placeholder="">
                </div>

                <div class="reset-actions">
                    <button class="btn-reset-cancel" onclick="playClickSound(); closeResetModal()">إلغاء</button>
                    <button class="btn-reset-confirm" onclick="playClickSound(); confirmReset()">
                        <i class="fas fa-trash-alt"></i> تأكيد الحذف
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ============================================
        // AUDIO
        // ============================================

        function playClickSound() {
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {}
        }

        function playSuccessSound() {
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 523.25;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 659.25;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                    osc2.start(audioCtx.currentTime);
                    osc2.stop(audioCtx.currentTime + 0.3);
                }, 150);
            } catch (e) {}
        }

        function playErrorSound() {
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 300;
                oscillator.type = 'sawtooth';
                gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) {}
        }

        // ============================================
        // DATA
        // ============================================

        const DRIVERS = {
            'taxi1': [{ id: 1, label: 'سائق رقم 1' }, { id: 2, label: 'سائق رقم 2' }],
            'taxi2': [{ id: 3, label: 'سائق رقم 1' }, { id: 4, label: 'سائق رقم 2' }],
            'grand': [{ id: 5, label: 'سائق رقم 1' }, { id: 6, label: 'سائق رقم 2' }],
            'koutchi': [{ id: 7, label: 'سائق رقم 1' }]
        };

        const CAR_NAMES = {
            'taxi1': 'سيارة صغيرة 1',
            'taxi2': 'سيارة صغيرة 2',
            'grand': 'سيارة كبيرة',
            'koutchi': 'كوتشي'
        };

        const CAR_ICONS = {
            'taxi1': '🚕',
            'taxi2': '🚖',
            'grand': '🚗',
            'koutchi': '🐴'
        };

        const RESET_CODE = '123443';

        let currentCarKey = null;
        let currentDriverId = null;

        // ============================================
        // DATABASE
        // ============================================

        function getShifts() {
            return JSON.parse(localStorage.getItem('shifts')) || [];
        }

        function setShifts(shifts) {
            localStorage.setItem('shifts', JSON.stringify(shifts));
        }

        function getNextId(items) {
            if (items.length === 0) return 1;
            return Math.max(...items.map(i => i.id)) + 1;
        }

        // ============================================
        // FORMAT
        // ============================================

        function formatNumber(num) {
            return num.toLocaleString('fr-FR');
        }

        function formatTime(date) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return hours + ':' + minutes;
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return year + '-' + month + '-' + day;
        }

        // ============================================
        // ALERT
        // ============================================

        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            const icons = { success: '✅', danger: '❌', warning: '⚠️' };
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `<span>${icons[type] || 'ℹ️'}</span> ${message}`;
            container.appendChild(alertDiv);
            setTimeout(() => {
                alertDiv.style.opacity = '0';
                alertDiv.style.transition = 'opacity 0.3s ease';
                setTimeout(() => alertDiv.remove(), 300);
            }, 3500);
        }

        // ============================================
        // NAVIGATION
        // ============================================

        function openCarSelection(carKey) {
            currentCarKey = carKey;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('car-selection-view').classList.add('active');
            document.getElementById('driver-detail-view').classList.remove('active');

            const carName = CAR_NAMES[carKey] || '';
            const carIcon = CAR_ICONS[carKey] || '🚗';
            document.getElementById('carSelectionTitle').innerHTML = `<span>${carIcon}</span> ${carName}`;

            renderDriverSelection(carKey);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeCarSelection() {
            document.getElementById('car-selection-view').classList.remove('active');
            document.getElementById('main-menu').style.display = 'block';
            currentCarKey = null;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openDriverDetail(driverId) {
            playClickSound();
            currentDriverId = driverId;
            document.getElementById('car-selection-view').classList.remove('active');
            document.getElementById('driver-detail-view').classList.add('active');

            const drivers = getAllDrivers();
            const driver = drivers.find(d => d.id === driverId);
            document.getElementById('driverDetailTitle').innerHTML = `<i class="fas fa-user"></i> ${driver ? driver.label : 'سائق'}`;

            renderDriverDetail(driverId);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeDriverDetail() {
            document.getElementById('driver-detail-view').classList.remove('active');
            document.getElementById('car-selection-view').classList.add('active');
            currentDriverId = null;
            if (currentCarKey) {
                renderDriverSelection(currentCarKey);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================================
        // RENDER
        // ============================================

        function renderDriverSelection(carKey) {
            const container = document.getElementById('drivers-selection-container');
            const drivers = DRIVERS[carKey] || [];
            const shifts = getShifts();

            if (drivers.length === 0) {
                container.innerHTML = `<p style="text-align:center;padding:30px;color:rgba(0,0,0,0.3);grid-column:1/-1;">لا يوجد سائقين</p>`;
                return;
            }

            container.innerHTML = drivers.map((driver, index) => {
                const driverShifts = shifts.filter(s => s.driver_id === driver.id);
                const total = driverShifts.reduce((sum, s) => sum + s.amount, 0);
                const count = driverShifts.length;
                const btnClass = index === 0 ? 'btn-driver1' : 'btn-driver2';

                return `
                    <button class="driver-select-btn ${btnClass}" onclick="openDriverDetail(${driver.id})">
                        <span class="d-icon">👤</span>
                        <span class="d-label">${driver.label}</span>
                        <span class="d-sub"><i class="fas fa-coins"></i> ${count} دفعة</span>
                        <span class="d-total">
                            <i class="fas fa-coins"></i> ${formatNumber(total)} DH
                        </span>
                    </button>
                `;
            }).join('');
        }

        function renderDriverDetail(driverId) {
            const container = document.getElementById('driver-detail-container');
            const shifts = getShifts();
            const drivers = getAllDrivers();
            const driver = drivers.find(d => d.id === driverId);

            if (!driver) {
                container.innerHTML = `<p style="text-align:center;padding:30px;color:rgba(0,0,0,0.3);">لم يتم العثور على السائق</p>`;
                return;
            }

            const driverShifts = shifts.filter(s => s.driver_id === driverId);
            const total = driverShifts.reduce((sum, s) => sum + s.amount, 0);
            const today = formatDate(new Date());
            const todayShifts = driverShifts.filter(s => s.shift_date === today);

            const allShifts = driverShifts.sort((a, b) => {
                if (a.shift_date !== b.shift_date) {
                    return b.shift_date.localeCompare(a.shift_date);
                }
                return (b.shift_time || '').localeCompare(a.shift_time || '');
            });

            container.innerHTML = `
                <div class="driver-header-single">
                    <span class="driver-name-single">
                        <i class="fas fa-user-circle" style="color:#1a3a6b;"></i> ${driver.label}
                    </span>
                    <span class="driver-total-single">
                        <i class="fas fa-coins"></i> ${formatNumber(total)} DH
                    </span>
                </div>

                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;font-size:14px;color:rgba(0,0,0,0.5);">
                    <span><i class="far fa-calendar-alt"></i> اليوم: ${todayShifts.length} دفعة</span>
                    <span><i class="fas fa-coins"></i> ${formatNumber(todayShifts.reduce((sum, s) => sum + s.amount, 0))} DH</span>
                    <span><i class="fas fa-list"></i> المجموع: ${allShifts.length} دفعة</span>
                </div>

                <div class="shift-row-single">
                    <label><i class="fas fa-money-bill-wave" style="color:#1a3a6b;"></i> المبلغ:</label>
                    <input type="number" id="shift-amount-single-${driverId}" placeholder="أدخل المبلغ" min="1">
                    <button class="btn-save-single" onclick="playClickSound(); saveShiftSingle(${driverId})">
                        <i class="fas fa-plus"></i> إضافة دفعة
                    </button>
                </div>

                <div class="shifts-list-single">
                    ${allShifts.length > 0 ? allShifts.map(s => `
                        <div class="shift-item-single">
                            <div class="shift-info-single">
                                <span class="shift-amount-single"><i class="fas fa-coins" style="color:#1a3a6b;"></i> ${formatNumber(s.amount)} DH</span>
                                <span class="shift-time-single">
                                    <i class="far fa-calendar-alt"></i> ${s.shift_date}
                                    ${s.shift_time ? ` <i class="far fa-clock"></i> ${s.shift_time}` : ''}
                                </span>
                            </div>
                            <div class="shift-actions-single">
                                <button class="btn-edit-shift-single" onclick="playClickSound(); openEditModalSingle(${s.id}, ${driverId}, ${s.amount})">
                                    <i class="fas fa-pen"></i>
                                </button>
                                <button class="btn-delete-shift-single" onclick="playClickSound(); deleteShiftSingle(${s.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `).join('') : `
                        <div class="no-shifts-single">
                            <i class="fas fa-inbox"></i> لا توجد دفعات مسجلة
                        </div>
                    `}
                </div>
            `;
        }

        // ============================================
        // CRUD OPERATIONS
        // ============================================

        function saveShiftSingle(driverId) {
            const input = document.getElementById(`shift-amount-single-${driverId}`);
            if (!input) return;
            const amount = parseFloat(input.value);

            if (!amount || amount <= 0) {
                playErrorSound();
                showAlert('الرجاء إدخال مبلغ صحيح', 'danger');
                return;
            }

            const now = new Date();
            const today = formatDate(now);
            const time = formatTime(now);

            const shifts = getShifts();

            shifts.push({
                id: getNextId(shifts),
                driver_id: driverId,
                shift_date: today,
                shift_time: time,
                amount: amount,
                is_paid: 1
            });

            setShifts(shifts);
            input.value = '';
            renderDriverDetail(driverId);
            if (currentCarKey) {
                renderDriverSelection(currentCarKey);
            }
            playSuccessSound();
            showAlert('✅ تم حفظ ' + amount + ' درهم', 'success');
        }

        let editShiftIdSingle = null;
        let editDriverIdSingle = null;

        function openEditModalSingle(shiftId, driverId, currentAmount) {
            editShiftIdSingle = shiftId;
            editDriverIdSingle = driverId;

            const drivers = getAllDrivers();
            const driver = drivers.find(d => d.id === driverId);
            document.getElementById('editModalSub').textContent = driver ? driver.label : 'سائق';
            document.getElementById('editAmountInput').value = currentAmount;

            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editShiftIdSingle = null;
            editDriverIdSingle = null;
        }

        function saveEditShift() {
            const input = document.getElementById('editAmountInput');
            const amount = parseFloat(input.value);

            if (!amount || amount <= 0) {
                playErrorSound();
                showAlert('الرجاء إدخال مبلغ صحيح', 'danger');
                return;
            }

            if (editShiftIdSingle === null) {
                showAlert('حدث خطأ، يرجى المحاولة مرة أخرى', 'danger');
                return;
            }

            const shifts = getShifts();
            const index = shifts.findIndex(s => s.id === editShiftIdSingle);
            if (index === -1) {
                showAlert('لم يتم العثور على الدفعة', 'danger');
                return;
            }

            shifts[index].amount = amount;
            setShifts(shifts);

            closeEditModal();
            if (currentDriverId) {
                renderDriverDetail(currentDriverId);
            }
            if (currentCarKey) {
                renderDriverSelection(currentCarKey);
            }
            playSuccessSound();
            showAlert('✅ تم تعديل المبلغ إلى ' + amount + ' درهم', 'success');
        }

        function deleteShiftSingle(shiftId) {
            if (!confirm('هل أنت متأكد من حذف هذه الدفعة؟')) return;

            const shifts = getShifts();
            const newShifts = shifts.filter(s => s.id !== shiftId);
            setShifts(newShifts);

            if (currentDriverId) {
                renderDriverDetail(currentDriverId);
            }
            if (currentCarKey) {
                renderDriverSelection(currentCarKey);
            }
            showAlert('🗑️ تم حذف الدفعة', 'danger');
        }

        // ============================================
        // RESET
        // ============================================

        function openResetModal() {
            document.getElementById('resetCodeInput').value = '';
            document.getElementById('resetModal').classList.add('show');
        }

        function closeResetModal() {
            document.getElementById('resetModal').classList.remove('show');
        }

        function confirmReset() {
            const code = document.getElementById('resetCodeInput').value;

            if (code !== RESET_CODE) {
                playErrorSound();
                showAlert('❌ كود الحماية غير صحيح!', 'danger');
                document.getElementById('resetCodeInput').value = '';
                document.getElementById('resetCodeInput').focus();
                return;
            }

            if (!confirm('⚠️ هل أنت متأكد من حذف جميع الدفعات؟ هذا الإجراء لا يمكن التراجع عنه!')) {
                return;
            }

            setShifts([]);

            closeResetModal();

            if (currentCarKey) {
                renderDriverSelection(currentCarKey);
            }
            if (currentDriverId) {
                renderDriverDetail(currentDriverId);
            }

            playSuccessSound();
            showAlert('🔄 تم حذف جميع الدفعات', 'success');
        }

        // ============================================
        // HELPERS
        // ============================================

        function getAllDrivers() {
            let all = [];
            Object.keys(DRIVERS).forEach(key => {
                all = all.concat(DRIVERS[key]);
            });
            return all;
        }

        // ============================================
        // INIT
        // ============================================

        if (getShifts().length === 0) {
            const today = formatDate(new Date());
            const sampleShifts = [
                { id: 1, driver_id: 1, shift_date: today, shift_time: '08:30', amount: 150, is_paid: 1 },
                { id: 2, driver_id: 1, shift_date: today, shift_time: '12:15', amount: 120, is_paid: 1 },
                { id: 3, driver_id: 2, shift_date: today, shift_time: '09:00', amount: 180, is_paid: 1 },
                { id: 4, driver_id: 3, shift_date: today, shift_time: '10:30', amount: 160, is_paid: 1 },
                { id: 5, driver_id: 5, shift_date: today, shift_time: '08:00', amount: 200, is_paid: 1 },
                { id: 6, driver_id: 7, shift_date: today, shift_time: '09:45', amount: 140, is_paid: 1 },
                { id: 7, driver_id: 1, shift_date: '2026-06-27', shift_time: '08:00', amount: 130, is_paid: 1 },
                { id: 8, driver_id: 2, shift_date: '2026-06-27', shift_time: '09:30', amount: 110, is_paid: 0 },
                { id: 9, driver_id: 3, shift_date: '2026-06-27', shift_time: '10:00', amount: 160, is_paid: 1 },
                { id: 10, driver_id: 5, shift_date: '2026-06-27', shift_time: '08:15', amount: 190, is_paid: 1 },
                { id: 11, driver_id: 7, shift_date: '2026-06-27', shift_time: '09:00', amount: 150, is_paid: 1 },
                { id: 12, driver_id: 1, shift_date: '2026-06-26', shift_time: '08:00', amount: 140, is_paid: 1 },
                { id: 13, driver_id: 2, shift_date: '2026-06-26', shift_time: '09:00', amount: 130, is_paid: 1 },
                { id: 14, driver_id: 3, shift_date: '2026-06-26', shift_time: '10:30', amount: 140, is_paid: 1 },
                { id: 15, driver_id: 5, shift_date: '2026-06-26', shift_time: '08:30', amount: 170, is_paid: 0 },
                { id: 16, driver_id: 7, shift_date: '2026-06-26', shift_time: '09:15', amount: 140, is_paid: 1 }
            ];
            setShifts(sampleShifts);
        }

        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('car-selection-view').classList.remove('active');
        document.getElementById('driver-detail-view').classList.remove('active');

        // Close modals on overlay click
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });
        document.getElementById('resetModal').addEventListener('click', function(e) {
            if (e.target === this) closeResetModal();
        });

        // Close modals with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeEditModal();
                closeResetModal();
            }
        });

        // Enter key on reset code input
        document.getElementById('resetCodeInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                confirmReset();
            }
        });
    </script>
</body>
</html>
